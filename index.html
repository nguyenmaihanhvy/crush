<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu Vườn Bên Cửa Sổ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1@500&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #f4e8d1; /* Màu nền giấy cũ nếu ảnh chưa load xong */
            font-family: 'Cormorant Garamond', serif;
        }

        #window-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
        }

        .window-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            /* TÔI ĐÃ THAY BẰNG LINK ẢNH TRỰC TIẾP ĐỂ TRÁNH LỖI TRẮNG TRANG */
            background-image: url('https://lh3.googleusercontent.com/d/1ZpI2p-7H7pU6kX-k5S5J9R8YQZ_K7I_T'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: gentleBreeze 10s ease-in-out infinite;
            z-index: 1;
        }

        /* Hiệu ứng nắng chiếu mờ ảo */
        .sunlight-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(255,245,200,0.2) 50%, rgba(255,255,255,0) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .instruction {
            position: absolute;
            bottom: 12%;
            color: #4a3728;
            font-size: 1.3rem;
            font-style: italic;
            z-index: 10;
            letter-spacing: 1px;
            opacity: 0.8;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes gentleBreeze {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 0.9; transform: translateY(-5px); }
        }

        /* Hiệu ứng khi bấm vào cửa sổ */
        .fade-out {
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            pointer-events: none;
        }

        #next-content {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fffaf5;
            z-index: 50;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        #next-content.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="window-wrapper" onclick="openWindow()">
        <!-- Lớp ảnh nền -->
        <div class="window-bg"></div>
        <!-- Lớp nắng -->
        <div class="sunlight-effect"></div>
        <p class="instruction">Chạm vào cửa sổ để mở ra...</p>
    </div>

    <div id="next-content">
        <div style="text-align: center;">
            <h1 style="color: #5d4037; font-weight: normal; font-size: 2.5rem;">Cánh cửa đã mở...</h1>
            <p style="color: #8d6e63; margin-top: 10px;">(Tiếp tục triển khai ý tưởng của bạn tại đây)</p>
        </div>
    </div>

    <script>
        function openWindow() {
            const windowWrapper = document.getElementById('window-wrapper');
            const nextContent = document.getElementById('next-content');

            windowWrapper.classList.add('fade-out');

            setTimeout(() => {
                windowWrapper.style.display = 'none';
                nextContent.classList.add('show');
            }, 1500);
        }
    </script>
</body>
</html>
