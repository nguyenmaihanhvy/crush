<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Secret Window</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --wood: #6d4c41;
            --leaf: #81c784;
            --flower: #f06292;
            --sky: #e3f2fd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #faf3e0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
        }

        /* KHUNG CẢNH GAME */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, var(--sky), #ffffff);
            cursor: pointer;
        }

        /* CỬA SỔ GỖ (Vẽ bằng CSS) */
        .window-frame {
            position: relative;
            width: 320px;
            height: 450px;
            border: 15px solid var(--wood);
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1), inset 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            z-index: 5;
        }

        /* Thanh gỗ chia ô cửa */
        .window-frame::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; width: 100%; height: 8px;
            background: var(--wood); transform: translateY(-50%);
        }
        .window-frame::after {
            content: '';
            position: absolute;
            left: 50%; top: 0; width: 8px; height: 100%;
            background: var(--wood); transform: translateX(-50%);
        }

        /* RÈM CỬA LAY ĐỘNG */
        .curtain {
            position: absolute;
            top: 0;
            width: 60%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 6;
            transition: all 1.5s ease-in-out;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .curtain.left { left: 0; border-radius: 0 0 100% 0; animation: sway 4s infinite ease-in-out; }
        .curtain.right { right: 0; border-radius: 0 0 0 100%; animation: sway 4.5s infinite ease-in-out reverse; }

        /* HOA CỎ BÊN DƯỚI */
        .garden {
            position: absolute;
            bottom: -20px;
            width: 120%;
            display: flex;
            justify-content: space-around;
            z-index: 10;
        }

        .flower {
            font-size: 3rem;
            animation: bounce 3s infinite ease-in-out;
        }

        /* HIỆU ỨNG KHI CLICK */
        .window-frame.open .curtain.left { transform: translateX(-100%) rotateY(-20deg); opacity: 0.3; }
        .window-frame.open .curtain.right { transform: translateX(100%) rotateY(20deg); opacity: 0.3; }

        /* TEXT GỢI Ý */
        .ui-text {
            position: absolute;
            bottom: 50px;
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: var(--wood);
            text-align: center;
            pointer-events: none;
            z-index: 20;
        }

        /* ANIMATIONS */
        @keyframes sway {
            0%, 100% { transform: skewX(2deg); }
            50% { transform: skewX(-2deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        /* MÀN HÌNH SAU KHI MỞ */
        #secret-message {
            position: absolute;
            opacity: 0;
            transition: 2s;
            text-align: center;
            z-index: 1;
        }
        #secret-message.show { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="game-container" onclick="handleInteraction()">
        
        <!-- THÔNG ĐIỆP ẨN DƯỚI CỬA SỔ -->
        <div id="secret-message">
            <h2 style="color: #d81b60; font-size: 2.5rem; font-family: 'Dancing Script';">Bạn là điều tuyệt vời nhất!</h2>
            <p style="color: #6d4c41;">Khu vườn này nở hoa là vì có bạn...</p>
        </div>

        <!-- KHUNG CỬA SỔ -->
        <div class="window-frame" id="window">
            <div class="curtain left"></div>
            <div class="curtain right"></div>
        </div>

        <!-- HOA CỎ DƯỚI CÙNG -->
        <div class="garden">
            <div class="flower" style="animation-delay: 0.1s">🌸</div>
            <div class="flower" style="animation-delay: 0.5s">🌷</div>
            <div class="flower" style="animation-delay: 0.3s">🌿</div>
            <div class="flower" style="animation-delay: 0.7s">🌻</div>
            <div class="flower" style="animation-delay: 0.2s">🌸</div>
        </div>

        <div class="ui-text" id="hint">Gió thổi nhè nhẹ... Chạm để mở cửa sổ nhé</div>
    </div>

    <script>
        let isOpen = false;

        function handleInteraction() {
            if(!isOpen) {
                const windowFrame = document.getElementById('window');
                const hint = document.getElementById('hint');
                const message = document.getElementById('secret-message');

                // Mở cửa sổ
                windowFrame.classList.add('open');
                
                // Ẩn hướng dẫn
                hint.style.opacity = '0';

                // Hiện thông điệp bí mật
                setTimeout(() => {
                    message.classList.add('show');
                }, 800);

                isOpen = true;
            }
        }
    </script>
</body>
</html>
