<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Điệp Định Mệnh</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b021a;
            --gold: #d4af37;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Lớp nền hạt lấp lánh */
        #particles-js {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; /* Đảm bảo nằm dưới cùng */
        }

        .container {
            position: relative;
            z-index: 10; /* Đảm bảo nằm trên lớp đen */
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .card-wrap {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            width: 150px;
            height: 250px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border: 1px solid var(--gold);
            border-radius: 10px;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            padding: 10px;
        }

        .front {
            background: #1a0d2e;
            font-size: 2rem;
        }

        .back {
            background: #fff5e6;
            color: #2c1a05;
            transform: rotateY(180deg);
            text-align: center;
        }

        .back p { font-size: 1.1rem; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="container">
        <h1>Chọn một lá bài cho hôm nay...</h1>
        <div class="card-wrap">
            <div class="card" onclick="this.classList.toggle('flipped')">
                <div class="card-inner">
                    <div class="front">🔮</div>
                    <div class="back"><p>🌸 Bạn rạng rỡ như một đóa hoa sớm mai.</p></div>
                </div>
            </div>
            <div class="card" onclick="this.classList.toggle('flipped')">
                <div class="card-inner">
                    <div class="front">🔮</div>
                    <div class="back"><p>✨ Vũ trụ bảo rằng bạn xứng đáng với những điều ngọt ngào nhất.</p></div>
                </div>
            </div>
            <div class="card" onclick="this.classList.toggle('flipped')">
                <div class="card-inner">
                    <div class="front">🔮</div>
                    <div class="back"><p>🌿 Có một bất ngờ nhỏ đang chờ bạn vào tối nay!</p></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 50 },
                "color": { "value": "#d4af37" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3 },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 1 }
            }
        });
    </script>
</body>
</html>
