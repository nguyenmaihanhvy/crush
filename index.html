<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vũ Trụ Vô Tận</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            color: white;
            perspective: 1200px; /* Tăng độ sâu cho hiệu ứng 3D xoay */
        }

        /* ----- 1. LỚP SƯƠNG MÙ ĐA TẦNG (MOVING FOG) ----- */
        .fog-container {
            position: fixed;
            width: 150%;
            height: 150%;
            top: -25%; left: -25%;
            z-index: 2;
            pointer-events: none;
            filter: blur(50px); /* Làm mờ mạnh để sương trông mềm mại */
        }

        .fog-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                135deg,
                rgba(72, 52, 212, 0.05) 0%,   /* Tím mờ */
                rgba(104, 109, 224, 0.05) 30%, /* Xanh mờ */
                transparent 70%,
                rgba(190, 46, 221, 0.03) 100%   /* Hồng mờ */
            );
            background-size: 200% 200%;
            animation: moveFog infinite linear;
        }
        /* Lớp sương 1: Di chuyển chậm */
        .fog-layer.one { animation-duration: 40s; opacity: 0.6; }
        /* Lớp sương 2: Di chuyển ngược lại, nhanh hơn */
        .fog-layer.two { animation-duration: 30s; animation-direction: reverse; opacity: 0.4; transform: scale(1.2); }
        /* Lớp sương 3: Di chuyển xéo, rất chậm */
        .fog-layer.three { animation-duration: 50s; animation-delay: -10s; background-position: 100% 100%; opacity: 0.3; }

        /* ----- 2. HỆ THỐNG VŨ TRỤ XOAY 360 ĐỘ ----- */
        #universe {
            position: fixed;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            animation: rotateUniverse 60s infinite linear; /* Tự động xoay chậm */
            z-index: 1;
        }

        canvas {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        /* ----- 3. NỘI DUNG CHÍNH (LƠ LỬNG TRONG TÂM) ----- */
        .main-stage {
            position: relative;
            z-index: 10;
            text-align: center;
            transform-style: preserve-3d;
        }

        .floating-star {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #fff 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            margin: 0 auto 30px;
            cursor: pointer;
            box-shadow: 0 0 50px rgba(255,255,255,0.7), 0 0 100px rgba(104, 109, 224, 0.5);
            animation: floatStar 5s infinite ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .sub-text {
            font-weight: 300;
            font-size: 1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
        }

        /* MODAL THÔNG ĐIỆP */
        #message-box {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .card {
            padding: 50px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            text-align: center;
            max-width: 450px;
            background: rgba(255,255,255,0.03);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* ----- ANIMATIONS ----- */
        /* Di chuyển sương mù */
        @keyframes moveFog {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* Xoay vũ trụ 360 độ */
        @keyframes rotateUniverse {
            from { transform: rotateY(0deg) rotateX(10deg); }
            to { transform: rotateY(360deg) rotateX(10deg); }
        }

        /* Ngôi sao lơ lửng */
        @keyframes floatStar {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); filter: brightness(1); }
            50% { transform: translateY(-25px) scale(1.1) rotate(5deg); filter: brightness(1.3); }
        }
    </style>
</head>
<body>

    <div class="fog-container">
        <div class="fog-layer one"></div>
        <div class="fog-layer two"></div>
        <div class="fog-layer three"></div>
    </div>

    <div id="universe">
        <canvas id="stars-far"></canvas>
        <canvas id="stars-near"></canvas>
    </div>

    <div class="main-stage">
        <div class="floating-star" onclick="showMessage()">✨</div>
        <p class="sub-text">Chạm vào tinh tú duy nhất</p>
    </div>

    <div id="message-box" onclick="closeMessage()">
        <div class="card">
            <h2 style="font-family: 'Dancing Script'; font-size: 2.5rem; margin-bottom: 20px; color: #a29bfe;">Chào bạn!</h2>
            <p style="line-height: 2; font-weight: 300; font-size: 1.1rem; color: rgba(255,255,255,0.8);">
                Giữa vũ trụ bao la này, cảm ơn bạn đã xuất hiện và trở thành một phần đẹp đẽ nhất trong thế giới của tôi. 
                <br><br>
                <b>Chúc bạn một ngày thật bình yên nhé!</b>
            </p>
        </div>
    </div>

    <script>
        // Xử lý vẽ sao trên Canvas
        function createStars(id, count, speed) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            let stars = [];

            function init() {
                // Tăng kích thước canvas để sao không bị đứt đoạn khi xoay
                canvas.width = window.innerWidth * 2;
                canvas.height = window.innerHeight * 2;
                canvas.style.top = '-50%';
                canvas.style.left = '-50%';
                stars = [];
                for (let i = 0; i < count; i++) {
                    stars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        // Tăng kích thước sao để rõ ràng hơn
                        size: Math.random() * (id === 'stars-near' ? 2.5 : 1.5),
                        o: Math.random(),
                        // Thêm hiệu ứng nhấp nháy ngẫu nhiên
                        twinkle: Math.random() * 0.02
                    });
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => {
                    // Cập nhật độ mờ để nhấp nháy
                    s.o += s.twinkle;
                    if (s.o > 1 || s.o < 0.2) s.twinkle = -s.twinkle;

                    ctx.fillStyle = `rgba(255, 255, 255, ${s.o})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Sao trôi chậm
                    s.y -= speed;
                    if (s.y < 0) s.y = canvas.height;
                });
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', init);
            init();
            animate();
        }

        // Tạo 2 lớp sao
        createStars('stars-far', 200, 0.03);
        createStars('stars-near', 100, 0.1);

        function showMessage() {
            document.getElementById('message-box').style.display = 'flex';
        }

        function closeMessage() {
            document.getElementById('message-box').style.display = 'none';
        }
    </script>
</body>
</html>
