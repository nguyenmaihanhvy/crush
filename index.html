<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu Vườn Của Bạn</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --soft-gold: #fdf5e6;
            --text-color: #4a3728;
            --accent: #8fb996;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Cormorant Garamond', serif;
            background-color: #fcf8f3;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container chính */
        .window-scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('https://i.imgur.com/your-window-image.jpg'); /* Thay bằng ảnh cửa sổ của bạn */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 5vh;
        }

        /* Hiệu ứng nắng chiếu xuyên qua (Sunbeams) */
        .sunlight {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,253,230,0.4) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
            z-index: 2;
        }

        /* Khu vực chậu hoa tương tác */
        .flower-pots {
            display: flex;
            gap: 40px;
            z-index: 10;
        }

        .pot {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
            text-align: center;
        }

        .pot:hover { transform: scale(1.1); }

        .pot-icon { font-size: 4rem; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1)); }

        /* Mẩu giấy nhắn hiện ra */
        .message-tag {
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: white;
            padding: 15px 20px;
            width: 200px;
            border-radius: 2px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 3px solid var(--accent);
        }

        .message-tag::after {
            content: '';
            position: absolute;
            bottom: -10px; left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid white;
        }

        .pot.active .message-tag {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .pot.active .pot-icon { animation: bloom 0.5s ease-in-out forwards; }

        @keyframes bloom {
            0% { transform: scale(1); }
            50% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1.2); }
        }

        h2 {
            font-family: 'Dancing Script', cursive;
            color: var(--text-color);
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 1.8rem;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
        }

        .hint {
            font-size: 1rem;
            color: #777;
            margin-top: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="window-scene">
        <div class="sunlight"></div>

        <div class="content">
            <h2>Chạm vào từng nhành cây để lắng nghe...</h2>
            
            <div class="flower-pots">
                <!-- Chậu 1 -->
                <div class="pot" onclick="togglePot(this)">
                    <div class="message-tag">
                        <p>Bạn biết không? Nụ cười của bạn làm bừng sáng cả căn phòng này.</p>
                    </div>
                    <div class="pot-icon">🌿</div>
                    <div class="hint">Tưới nước</div>
                </div>

                <!-- Chậu 2 -->
                <div class="pot" onclick="togglePot(this)">
                    <div class="message-tag">
                        <p>Hôm nay trời nắng đẹp, rất thích hợp để chúng mình đi cafe nhỉ?</p>
                    </div>
                    <div class="pot-icon">🌸</div>
                    <div class="hint">Tưới nước</div>
                </div>

                <!-- Chậu 3 -->
                <div class="pot" onclick="togglePot(this)">
                    <div class="message-tag">
                        <p>Cảm ơn bạn đã luôn là một đóa hoa rạng rỡ nhất trong lòng tôi.</p>
                    </div>
                    <div class="pot-icon">🌼</div>
                    <div class="hint">Tưới nước</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePot(element) {
            // Đóng các chậu khác nếu muốn (tùy chọn)
            document.querySelectorAll('.pot').forEach(p => {
                if(p !== element) p.classList.remove('active');
            });
            
            // Bật chậu hiện tại
            element.classList.toggle('active');
            
            // Đổi icon hoa khi nở (tùy chọn)
            const icon = element.querySelector('.pot-icon');
            if (element.classList.contains('active')) {
                if (icon.innerText === '🌿') icon.innerText = '🪴';
            }
        }
    </script>
</body>
</html>
