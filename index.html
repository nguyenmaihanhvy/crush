<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu Vườn Bên Cửa Sổ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #f4e8d1; /* Màu nền giấy cũ */
            font-family: 'Cormorant Garamond', serif;
        }

        /* Container chính chứa toàn bộ khung cảnh */
        #window-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 1.5s ease-in-out, transform 1.5s ease-in-out;
            z-index: 100;
        }

        /* Hình ảnh cửa sổ của bạn */
        .window-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            /* Thay image_2.png bằng đường dẫn ảnh của bạn */
            background-image: url('image_2.png'); 
            background-size: cover;
            background-position: center;
            /* Hiệu ứng gió thổi nhè nhẹ cho toàn bộ khung cảnh */
            animation: gentleBreeze 8s ease-in-out infinite;
            z-index: 1;
        }

        /* Lớp phủ ánh nắng lung linh */
        .sunlight-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, rgba(255,255,255,0) 30%, rgba(255,250,200,0.2) 50%, rgba(255,255,255,0) 70%);
            background-size: 200% 200%;
            animation: sunMove 10s linear infinite;
            z-index: 2;
            pointer-events: none;
        }

        /* Gợi ý tương tác */
        .instruction {
            position: absolute;
            bottom: 10%;
            color: rgba(74, 55, 40, 0.8);
            font-size: 1.2rem;
            letter-spacing: 2px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            animation: pulse 3s ease-in-out infinite;
        }

        /* Animation Gió thổi nhè nhẹ */
        @keyframes gentleBreeze {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02) rotate(0.2deg); }
        }

        /* Animation Nắng lay động */
        @keyframes sunMove {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Animation Chữ nhấp nháy nhẹ */
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Trạng thái sau khi bấm (Cửa sổ mở ra/biến mất) */
        .fade-out {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        /* Phần nội dung sẽ hiện ra sau (Tạm thời ẩn) */
        #next-content {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff9f2;
            z-index: 50;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        #next-content.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Màn hình mở đầu -->
    <div id="window-wrapper" onclick="openWindow()">
        <div class="window-bg"></div>
        <div class="sunlight-effect"></div>
        <p class="instruction">Chạm vào cửa sổ để mở ra...</p>
    </div>

    <!-- Màn hình tiếp theo (Bạn sẽ triển khai thêm ở đây) -->
    <div id="next-content">
        <h1 style="color: #4a3728; font-style: italic;">Chào mừng bạn đến với khu vườn...</h1>
    </div>

    <script>
        function openWindow() {
            const windowWrapper = document.getElementById('window-wrapper');
            const nextContent = document.getElementById('next-content');

            // Kích hoạt hiệu ứng biến mất cho cửa sổ
            windowWrapper.classList.add('fade-out');

            // Sau khi hiệu ứng hoàn tất, cho nội dung mới hiện lên
            setTimeout(() => {
                windowWrapper.style.display = 'none';
                nextContent.classList.add('show');
            }, 1500);
        }
    </script>
</body>
</html>
