<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Điệp Từ Những Đóa Hoa</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #0f0a1a;
            --gold-bright: #e2c275;
            --cream: #fff9f2;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-deep);
            color: var(--cream);
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #particles-js {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--gold-bright);
            margin-bottom: 30px;
            font-style: italic;
            text-shadow: 0 0 10px rgba(226, 194, 117, 0.4);
        }

        .tarot-wrapper {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            perspective: 1500px; /* Tăng độ sâu 3D */
        }

        .card {
            width: 200px;
            height: 340px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden; /* Quan trọng: Giấu mặt sau khi lật */
            -webkit-backface-visibility: hidden;
            border-radius: 12px;
            border: 2px solid var(--gold-bright);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Mặt trước */
        .front {
            background: #1e1626;
            background-image: url('https://www.transparenttextures.com/patterns/floral-paper.png');
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .front-design {
            width: 85%; height: 90%;
            border: 1px solid rgba(226, 194, 117, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--gold-bright);
        }

        /* Mặt sau */
        .back {
            background-color: var(--cream);
            color: #2c1a05;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
        }

        .card-img {
            width: 100%;
            height: 65%;
            object-fit: cover;
            border-bottom: 1px solid var(--gold-bright);
        }

        .card-desc {
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            background-image: url('https://www.transparenttextures.com/patterns/p6.png');
        }

        .card-desc h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            margin-bottom: 5px;
            color: #8e6d5a;
        }

        .card-desc p {
            font-size: 0.95rem;
            line-height: 1.3;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .card { width: 140px; height: 240px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="main-content">
        <h1>Thông điệp từ những đóa hoa...</h1>
        <div class="tarot-wrapper">
            
            <div class="card" onclick="this.classList.toggle('is-flipped')">
                <div class="card-inner">
                    <div class="face front"><div class="front-design">🌸</div></div>
                    <div class="back">
                        <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=500" class="card-img" alt="The Lovers">
                        <div class="card-desc">
                            <h3>The Lovers</h3>
                            <p>"Sự kết nối giữa chúng ta là điều kỳ diệu nhất mà vũ trụ ban tặng."</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card" onclick="this.classList.toggle('is-flipped')">
                <div class="card-inner">
                    <div class="face front"><div class="front-design">🌿</div></div>
                    <div class="back">
                        <img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=500" class="card-img" alt="Ten of Cups">
                        <div class="card-desc">
                            <h3>Ten of Cups</h3>
                            <p>"Hạnh phúc trọn vẹn đôi khi chỉ đơn giản là thấy nụ cười của bạn mỗi ngày."</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card" onclick="this.classList.toggle('is-flipped')">
                <div class="card-inner">
                    <div class="face front"><div class="front-design">✨</div></div>
                    <div class="back">
                        <img src="https://images.unsplash.com/photo-1455218873509-8097305ee378?q=80&w=500" class="card-img" alt="The World">
                        <div class="card-desc">
                            <h3>The World</h3>
                            <p>"Bạn là cả thế giới rạng rỡ và yên bình mà tôi luôn tìm kiếm."</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 50, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#e2c275" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.4, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 1, "direction": "bottom", "random": true, "out_mode": "out" }
            }
        });
    </script>
</body>
</html>
